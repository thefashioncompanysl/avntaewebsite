<!doctype html>
<html lang="en">
  <head>
    <script>
      /**
       * Robust defensive fix for environments where window.fetch is a getter-only property.
       * This allows scripts that proxy or mock fetch to work correctly without causing TypeErrors.
       */
      (function() {
        try {
          var target = window;
          var descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
          
          if (descriptor && descriptor.configurable) {
            // Check if it's an accessor (getter) or a read-only data property
            if (!descriptor.writable || descriptor.get) {
              var originalFetch = target.fetch;
              Object.defineProperty(target, 'fetch', {
                value: originalFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            }
          } else if (!descriptor) {
            // Case where it's on prototype but we want to shadow it on window
            var protoFetch = target.fetch;
            if (protoFetch) {
              target.fetch = protoFetch;
            }
          }
        } catch (e) {
          console.warn('Fetch property fix failed', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avntae</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
